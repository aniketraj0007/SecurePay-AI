<!-- components/auth-modal.html -->
<div class="auth-card">
    <button id="btn-close-modal" class="btn-icon btn-close-modal"><i data-lucide="x" class="icon-md"></i></button>
    <div class="auth-card-top">
        <div class="logo-box">
            <i data-lucide="shield-check" class="icon-brand"></i>
        </div>
        <h2 id="auth-title">Log in to SecurePay-AI</h2>
        <p class="text-secondary" id="auth-subtitle">Unlock advanced analytics and real-time alerts.</p>
        <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login" type="button">Login</button>
            <button class="auth-tab" id="tab-signup" type="button">Sign Up</button>
        </div>
    </div>
    <!-- Alerts -->
    <div id="auth-alert" class="auth-alert hidden"></div>
    <form id="auth-form" class="auth-form">
        <div class="input-set field-name hidden">
            <label>Full Name</label>
            <input type="text" id="inp-name" placeholder="John Doe">
        </div>
        <div class="input-set">
            <label>Work Email</label>
            <input type="email" id="inp-email" placeholder="admin@enterprise.com" required>
        </div>
        <div class="input-set" id="field-pwd">
            <label>Password</label>
            <input type="password" id="inp-pwd" placeholder="••••••••" required>
            <div class="text-right mt-1">
                <a href="#" class="text-xs text-neon reset-pwd-link">Forgot Password?</a>
            </div>
        </div>
        <button type="submit" class="btn-primary w-full mt-2" id="btn-auth-submit">
            <span class="btn-text" id="auth-btn-text">Log In</span>
            <i data-lucide="arrow-right" class="icon-sm btn-icon-right"></i>
        </button>
        
        <button type="button" class="btn-outline w-full mt-4" id="btn-guest">
            Continue as Guest
        </button>
        
        <div style="display: flex; align-items: center; justify-content: center; margin: 1.5rem 0;">
            <hr style="flex: 1; border: none; border-top: 1px solid var(--border-subtle);">
            <span style="padding: 0 10px; font-size: 12px; color: var(--text-secondary); font-weight: 600;">OR</span>
            <hr style="flex: 1; border: none; border-top: 1px solid var(--border-subtle);">
        </div>

        <button type="button" class="btn-outline w-full" id="btn-google" style="margin-bottom: 0.75rem; display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(255,255,255,0.03);">
            <img src="https://www.svgrepo.com/show/475656/google-color.svg" alt="Google" style="width: 18px; height: 18px; filter: drop-shadow(0 0 2px rgba(255,255,255,0.2));">
            <span style="font-weight: 500;">Continue with Google</span>
        </button>
    </form>
</div>
