<!-- components/quick-scan-modal.html -->
<div class="auth-card glass-panel relative mx-auto mt-20 p-8 rounded-xl" style="width: 400px; max-width: 90vw;">
    <button class="btn-icon absolute top-4 right-4" id="btn-close-scan"><i data-lucide="x" class="icon-sm text-secondary hover-neon"></i></button>
    <div class="text-center mb-6">
        <i data-lucide="shield-check" class="icon-lg text-neon mx-auto mb-2" style="filter: drop-shadow(0 0 10px rgba(6,182,212,0.4));"></i>
        <h2 style="font-size: 1.5rem; font-weight: 700;">Quick Fraud Check</h2>
        <p style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.25rem;">Manual transaction analysis</p>
    </div>
    
    <div id="scan-form-view">
        <div class="input-set mb-4" style="text-align: left;">
            <label style="display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px;">Amount (₹)</label>
            <input type="number" id="scan-amt" placeholder="e.g. 45000" style="width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border-subtle); border-radius: 6px; padding: 0.75rem; color: white;" required>
        </div>
        <div class="input-set mb-6" style="text-align: left;">
            <label style="display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px;">Location</label>
            <input type="text" id="scan-loc" placeholder="e.g. Mumbai, IN" style="width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border-subtle); border-radius: 6px; padding: 0.75rem; color: white;" required>
        </div>
        <button type="button" class="btn-primary w-full" id="btn-run-check" style="margin-top: 1rem;">Check Fraud Risk</button>
    </div>
    
    <div id="scan-result-view" class="hidden text-center mt-4">
        <div id="scan-spinner" class="hidden" style="margin-bottom: 1rem;">
            <i data-lucide="loader" class="icon-lg text-neon mx-auto animate-spin" style="animation: spin 1s linear infinite;"></i>
        </div>
        <div id="scan-done" class="hidden" style="margin-top: 1rem;">
            <h2 id="scan-output-risk" style="font-size: 3rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 0.25rem;">89%</h2>
            <p style="font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 1.5rem;">Calculated Risk Score</p>
            
            <div id="scan-reason-box" style="padding: 1rem; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 8px; text-align: left;">
                <span id="scan-reason-badge" style="font-size: 11px; font-weight: 700; color: var(--brand-danger); background: rgba(239, 68, 68, 0.15); padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 8px;">HIGH RISK</span>
                <p id="scan-reason-text" style="font-size: 13px; font-weight: 500; color: var(--text-primary); margin: 0;">Reason: High amount + unusual location</p>
            </div>
        </div>
    </div>
</div>
